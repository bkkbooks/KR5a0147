front:
  text: 紫陽眞人悟眞篇講義卷之二吕五
  hash: sha256:01efd842da086d1512d438d552905813727a13cf5d0ccf6e1391178cdf3dc28d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0147_HFL_002-001a, image: hfl/0066/0066-032.png}
body:
  text: 雲峯散人永嘉夏宗禹著不識玄中顛倒顛争知火裏好栽蓮牽將白虎歸家養産箇明珠似月圓謾守藥爐看火候但安神思任天然群陰剥盡丹成熟跳出凡龍壽萬年玄妙顛倒之說其義詳於前矣火裏栽蓮雖平叔以外事託喻其實是内丹作用工夫學者不得師傳謾勞註解且蓮生於水火生於木今以水中之物而種於火豈理也哉亦以人身中一物如蓮之狀生於眞陽之火雖曰火也其實水也雖曰水也其實火也以水言之則不流濕不潤下以火言之則不炎上不就燥火氣藏於水名曰内陽水氣藏於火名曰内陰陰陽聚精於水火故有象如蓮之質其蓮栽種成熟千變萬化或甜如蜜大如橘者此蓮也果生枝上子在胞中者亦此蓮也以至爲交梨火棗千名萬字總是金丹之表德也惟栽蓮得法於内則其象自形於外也白虎金精也吾能養之於家不使猖狂則金精之晶光發現乃虚室生白玄珠成象故如月之圓也修丹之士但知外丹火候在藥爐不知内丹火候在一己聖人傳藥不傳火不將火候著於文故平叔使之守眞抱一以契天地造化自然陰陽升降若合符節群陰剥盡體爲純陽不生不滅超出物表何樊籠之可拘何壽數之可期耶學仙須是學天仙唯有金丹最的端二物會時情性合五行全處虎龍蟠本因戊己爲媒娉遂使夫妻鎮合歡只候功成朝玉闕九光霞裏駕翔鸞鍾吕問道曰人中修取仙仙中升取天夫仙一也胡爲復有升天之間乎蓋純陰而無陽者鬼也純陽而無陰者仙也陰陽相雜者人也惟人可以爲鬼可以爲仙然仙有五等一曰天仙二曰神仙三曰地仙四曰鬼仙五曰人仙其天仙何修而致哉非法非術非氣非力惟積德累行以修金丹而已金丹者何不過二物交會五行純全長生久視而爲仙也太上曰恍恍惚惚其中有物杳杳冥冥其中有精是二物者乃日月魂魄陰陽媾精體天法象於交會之時感而遂通夫情性之妙所謂一月三旬一遇逢者是也若五行者乃金木水火土心肝脾肺腎攢簇其精英不用其形質使其無一或虧陰陽畢備自然龍虎蟠旋精神威猛可以禦外魔可以衛大道探本尋源三物豈能自合五行豈能自全只因戊己之土坐於中宫勾引東西不令間隔所謂金木交並水火交媾如夫妻之歡合此自媒娉之力也以此修爲於無之中成象於罔象之際積日累月廣修陰功冥契天地自然體歸純陽白日飛升上朝玉皇於金闕下跨綵鸞於紫霄翺翔九霞之光遊行八極之表學仙端的之效豈非天仙爲上乎要知産藥川源處只在西南是本鄉鉛見癸生須急採金逢望遠不堪嘗送歸土釜牢封閉次入流珠配厮當藥重一斤須二八調停火候託陰陽易曰西南得朋東北喪朋蓋西南坤位也即日月魂魄相需之方也每月晦之三十日當昩爽時月出於乙日出於甲甲乙相合故曰西南得朋是夜月華無跡故曰東北喪朋今平叔乃曰産藥川源只在西南之地豈非以月出於坤震符始受是坤一變而爲震月之陽魂初生故能懸象著明所謂三日庚生兊尸開黑銀𤇨出白銀來又曰山頭月出藥苗新即其川源所産也然月雖是太陰之精符證金水實竊陽晶以爲明究其天一所生之水非金鉛不能生之故金旺則水生月圓則潮大今乃採此鉛於癸生之時是母隱子胎吾能採之以爲金丹之用正一陽纔動作丹時也若金逢望遠則月過十五以後始生魄矣其魄屬陰自十六日至三十日則魄滿魂虧陽衰陰盛不堪嘗也旣不堪嘗望遠之金當急採癸生之鉛是水中金一味吾得之矣當送歸土釜之中宫以流珠配之以火候鍊之封閉牢實不使有飛走之患斤兩停匀不使有偏勝之失金丹何慮不成參同契曰汞日爲流珠青龍與之俱舉東以合西魂魄自相拘上弦兊數八下弦數亦八兩弦合其精乾坤體乃成二八應一斤易道正不傾良與此詩合同也莫把孤陰爲有陽獨修此物轉羸尪勞形按引皆非道鍊氣餐霞更是狂舉世謾求金汞伏何時得見虎龍降勸君窮取生身處返本還原是藥王雲房指玄篇曰涕涶精津氣血液七者元來盡屬陰若將此物爲仙質怎得飛神貫玉京又曰四大一身皆屬陰不知何物是陽精有縁得遇明師指得道神仙在只今二詩指迷後學何其深切著明耶今釋氏頑空飽座面壁以爲絶色慾保精氣可以造道吾見其形癯體弱轉加羸尪鍾鳴漏盡終爲陰靈善爽鬼而已甚而學道無知者亦徒熊頸烏伸餐霞服氣或指心腎爲金汞肝肺爲龍虎皆是盲修瞎鍊不識眞陽祖宗何以返本還原得成大藥耶雖然于入道之初密察人之一身不過涕唾精津氣血液心肝脾肺腎内外滋養成此幻軀豈可皆謂屬陰捨此之外寧復有眞陽爲何物乎私心甚不愜雲房之論凡二十年間親閲道藏請問九流所謂道人拜了千千箇盡說吞津並嚥唾舉世無能釋此疑者及觀靈源大道歌又只說此物元來無定位隨時變化因心意在體感熱則爲汗在鼻感風則爲涕在腎感合則爲精在眼感悲則爲淚亦不說眞陽是何物色又看太上七寳無漏經亦曰凡欲養神先養氣養氣先養淚養淚先養涕養涕先養唾養唾先養血養血先養精養精先養液養液先養水水是華池津液元炁之精在口中舌竅者亦不說陽精之實愈使人心意迷惑雖質諸鬼神而無所决但見獨修此物果致尫羸或心躁而煩或隨便而濁或腰重而拘或無夢而漏導引吐納夜以繼日容或少康茍因冗而廢則百病交攻藥餌並進非徒無益反大害焉旁觀者竊笑同道者亦退志而已惟予下愚不移信道愈堅必謂上聖前賢垂世立教豈可有誤後人只是吾身踐履不實師授不眞毅然脫去樊籠遍歷名山洞府默禱幽冥求竟玄指忽於龍虎山先感異夢次於祝融峰遭遇聖師其詳已具遇仙本末果得眞陽秘訣可以攝伏四大一身之陰非精非氣非腎非心非涕非唾非血非液生身處此物先天地生没身處此物先天地没金木水火土之五行攢簇於此心肝脾肺腎之五臟鍾靈於此涕唾精津氣血液之七物結秀於此其大也天地可容其小也纖塵不納其用也無内無外其得也無聖無凡百姓日用而不知聖人能究其本原茍得七返九還之妙可以爲藥之王爲道之本則群陰之物周流四體如子戀母自然不去心亦不躁便亦不濁腰亦不重夢亦不漏神氣混融精光映物何有於尫羸之患目如電閃髭如漆黑心靈能先知酬酢萬事不倦金汞自然伏龍虎自然降不在抽筋拔骨吐故納新自然與天地合德與日月合明與四時合序與鬼神合其吉凶信乎我有些子神仙術不在三千六百門也玄哉妙哉非盟天告地父子不傳違者天禍人刑無所禱也草木陰陽亦兩齊若還闕一不芳菲初開緑葉陽先唱次發紅花陰後隨常道即斯爲日用眞源返復有誰知報言學道諸君子不識陰陽莫强嗤一陰一陽之謂道偏陰偏陽之謂疾陰陽兩齊之論豈虚語哉萬物負陰而抱陽不容有一之偏勝茍陽偏而無陰則陽無以化陰偏而無陽則陰無以生譬諸草木緑葉先唱是陽先發生也紅花後隨是陰後茂實也其發生也則長養成就於春夏其茂實也則歸根復命於秋冬人能體此爲日用常行之道則晝爲陽夜爲陰子爲陽午爲陰陰陽迭運相須而成道眞原返覆生化爲無窮是與天地合德者也雖然陰陽兩齊非截然分爲兩事也陰中未嘗無陽陽中未嘗無陰故日爲太陽而中有金烏之陰月爲太陰而中有木兔之陽陰陽兩齊互爲造化學道者未易以强嗤也萬巷丹經語總同金丹只此是根宗依他坤位生成體種向乾家交感宫莫怪天機今漏泄都縁學道自迷蒙若人了得詩中意即見三清太上翁乾坤者易之門户衆卦之父母也學道者若不先修乾坤二卦如人無父母何以生身蓋坤位西南乾位西北坤爲純陰乾爲純陽陰陽旣純迥然遼絶何以爲造化惟坤位有生成之體而乾家有交感之宫平叔探賾索隱鈎深致遠發明參同契之祕奥敷揚龍虎經之玄微上可以代太上說法下可以曉誨後人鍾吕以後惟平叔獨步而已猗歟休哉且丹經萬卷有道有法有術疑若浩繁而金丹之語則總同也小法旁門三千六百而根本宗元捨金丹皆非道也夫道者何也與天地合德是也故乾爲天坤爲地天爲陽地爲陰勢若曠遠也而六子相生陰陽代謝見於日月交合之際易云天地不交則萬物不通天地一月一合乾坤一月六變自坤而生成自乾而交感故始也以坤而三變則爲乾終也復以乾而三變則爲坤運用無窮周而復始晦朔以之定弦望以之成二十四炁之循環周天度數之經歷所以陶萬彙而成歲功者皆乾坤六子之用也何以明之龍虎上經云三日月出庚西分於卯酉參同契曰畢昴之上震出爲證陽氣造端蓋庚與畢昴皆西方之坤位以坤之純陰而月生於此地是月禀純陰之炁也其炁旣陰其體必沉其性必昏何以明照八表生西入東而能運化無窮也夫月不能自明必受正陽之炁而始明是以月哉生魄於初三見於西方之坤坤一變而爲震震主六庚庚是震卦所直之辰是陰陽而能明也參同謂三日出爲爽震受庚西方長子繼父體因母立兆基平叔云三日庚生震户開黑銀𤇨出白銀來者是也坤二變而爲兊兊乃月之初八日月出於丁地兊主六丁是兊卦所直之辰上經云八日月出丁上弦金半斤契云兊受丁符上弦平如繩也平叔云月纔天際半輪明早有龍吟虎嘯聲是也坤三變而爲乾乾乃月之十五日月出於甲地乾主六甲甲是乾卦所直之辰上經云十五三陽備圓照東方甲金水温太陽赤髓流爲汞姹女弄明璫契云三五德備乾體乃成是夜月華圓滿太陰大明也非陰之能明乃眞陽大旺也然陽盛必擊乎陰而物極必反其本盛衰消長天理自然上經云月盈自合虧十六轉相减乾爻缺成巽平明月建辛是月之十六已後出於辛地乾一損成巽巽主六辛辛是巽卦所直之辰是時月光歸日陽爻當虧契云虧折神符盛衰漸革終還其初巽繼其統是也自二十一日至二十五日月出於丙南乾再損成艮艮主六丙丙是艮卦所直之辰上經云乾二損成艮二十三下弦水半斤契云艮主進止不得踰時是也自二十六至三十日月出乙地乃乾三損成坤坤主六乙乙是坤卦所直之辰上經云乾三變成坤坤乙三十日東北喪其朋月没於乙坤乙坤月旣晦土木金將化繼坤生震龍乾坤括終始契云五六坤承結括終始此其返本還原陰陽代謝其道大光其用無窮謂之天地交泰日月交合謂之乾三索而生三男坤三索而生三女男女氤氲陰陽匹配豈非依他坤位生成體種向乾家交感宫乎吁日者天之魂也大道之血髓也月者地之魄也大道之精炁也大道不失其日月所以曠劫而長存人身不失其日月所以不死而長生奈學者迷蒙天姿不穎甚者以妄爲常以酒爲漿六慾七情斷喪本眞則行尸行厠去人道遠矣何以爲三才並立之道乎今平叔漏泄天機直指玄關要路人能明此奥義則三清太上之尊非有限隔於我也所謂一得永得立躋聖位是也此理至玄至妙非夙有靈骨辦道堅心者難遇聖師往往當面蹉過學者謹之不識眞鉛正祖宗萬般作用枉施功休妻謾遣陰陽隔絶粒徒教腸胃空草木金銀皆滓質雲霞日月屬朦朧更饒吐納並存想總與金丹事不同學道以禁慾爲先此詩之意豈使人縱其慾哉非也大道無爲旁門多事世人徒知不近女色不食烟火或燒鍊丹藥或餐霞服氣或吐故納新或存心想腎以爲道之奥妙盡在是矣殊不知强制不出於自然有爲未免於妄想況鉛有眞有凡有祖有宗誠未易識茍得師傳則目擊道存赫赤金丹一日成矣儻盲修瞎鍊以上諸法止可安樂延年差勝於輕生迷本之徒仰視金丹大道初不相關也雖然漢天師迄今三十六代許旌陽家有四十餘口不妨白日飛升劉安王劉綱亦夫妻雙修魏伯陽亦有子仕宦豈休妻絶粒爲得道哉此無他或得道於童男之身或辦道於已娶之後無非勤修内行廣積陰功自下乘以達中乘自中乘以達上乘未有一蹴而能造大道也平叔之意非盡掃旁門之無益持以重形容金丹之道耳學者不可以文害意三五一都三箇宇古今明者實然稀東三南二同成五北一西方四共之戊己自居本生數三家相見結嬰兒嬰兒是一含眞炁十月胎圓入聖基三五者十五也以一加之得十六也十六即二八之數古今求道之士或以二八爲卯酉或以二八爲一斤殊不知金丹大道不出五行造化五行造化不逃天地大數何以明之蓋以二合八其數爲十十之爲數總括五行之祕彌綸天地之經是知天一生水地六成之地二生火天七成之天三生木地八成之地四生金天九成之天五生土地十成之此天一地二天三地四天五地六天七地八天九地十無非生成之大數神仙之隱語故不曰十而曰二八不曰十六而曰三五一古今學者如牛毛而達者如麟角信乎明此道者實稀也雖然天地生成之數不出於十而五行造化之妙必歸於五蓋以五爲土數土爲丹祖以東三之木南二之火歸於陽位同成於五北一之水西四之金處於陰位亦成於五至戊己自以五數而生土今平叔不言四象合和五行攢簇而獨言三家相見者何也蓋金木無令間隔得土居中而爲媒婆是三家也水火運化爲旣濟得土居中而爲勾般亦三家也所謂遇土却成三姓若無戊己不成丹也嬰兒結於三家即是無中養就兒也雖然嬰兒之結豈自外來皆由太一之眞先天之氣返本還原歸於自己而已其初也天施地生得父母之遺體以十月而胎養生身今也返本還原奪陰陽之造化亦以十月而超凡入聖也玄中玄妙中妙非塵凡所可測也此平叔悟眞祕㫖露於三五一之詩學者不遇仙師妄亂穿鑿予不揆詳解以發明之或者咎其言下漏泄爲多予應之曰嗜茶者不入酒肆好色者不樂清齋凡流俗子隨業有蠹不可以一律化也使其昩於性命之學雖以黄老爲師孔顔爲友耳提面命彼無冰炭者幾希視吾言爲何用儻夙生靈骨得此筌蹄因文解義則知心千載晤對萬里何幸如之所謂操百金遊市而失之途有得而用者吾金爲不失也或者無語卒敬書十六篇詳解以破天下之迷紫陽眞人悟眞篇請義卷之二
