front:
  text: 紫陽眞人悟眞篇講義卷之六吕九
  hash: sha256:75b5f55bff3a374a18be2ff8737b8e77d91eb91efc1509e3adf3cd0f6e874c69
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0147_HFL_006-001a, image: hfl/0066/0066-150.png}
body:
  text: 雲峰散人永嘉夏宗禹著五言四韻一首以象太一之數女子著青衣郎君彼素練見之不可用用之不可見恍惚裏相逢杳冥中有變一霎火焰飛眞人自出現平叔此詩用法太一之數大道玄微畢露無隱茍聰明慧智無師傳授終難强猜也且女子者陰也郎君者陽也青衣者東方甲乙木也素練者西方庚辛金也男女異體陰陽異氣金木異質東西異位若不可以爲道也惟聖人必混而一之使男女陰陽交感於中宫金木東西交并於黄道以女子而著青衣則陰能負陽也以郎君而披素練則陽能抱陰也自然和順積中英華發外虚室生白充實光輝則見之不可用用之不可見此正儒道之如有所立卓爾立則見其參於前即見之之謂也及瞻之在前忽焉在後雖欲從之末由也已此又不可用也釋氏之圓陀陀光爍爍明了了活潑潑亦用之之謂也而净智妙圓體自空寂此又不可見也太上曰恍恍惚惚其中有物則恍惚裏相逢者固非無所睹也杳杳冥冥其中有精則杳冥中有變者亦非無所用也存無守有頃刻而成至神聖極容易豈非一霎火焰飛眞人自出現乎如此則身外生身性上見性去住自如識破本來面目故以此凡火飛出眞火以此凡人現出眞人然則恍惚杳冥者豈其實耶無中有有中無玄中玄妙中妙可與神仙語難與凡骨言西江月十二首以應十二月之數内藥還如外藥内通外亦須通丹頭利害略相同温養兩般作用内有天然眞火鼎中赫赫長紅外爐增减要勤功妙絶莫過眞種修仙要道須鍊金液還丹然丹分内外温養兩般要是兼得其宜可以超凡入聖茍有内丹而無外丹則軀殻遺體皆父精母血四大假合凡骨沉滯無以點化何縁成道有外丹而無内丹則大藥雖奇徒爲外物反求諸己天眞已耗神疲氣散精爽不靈以外藥投之譬若火煮空鐺自速敗壞詎成造化平叔託詠此詞首以著明内外二藥其知道乎且外藥只用鈆汞二物並無雜類若五金八石草木滓腐皆使不著以火候抽添體天法象久久烹鍊氣數周天可以成寳仙經曰大藥旣成鵲餌成鳳鴉食成鸞犬䑛成龍人服登仙是也若内藥在身非心非腎非肺非脾非氣非精非血非液亦不過鉛汞二物陰陽匹配以眞火元陽鍊之一同外藥使鼎中赫赤依時增减鍊成純陽之質日中無影方可服食外丹使形神俱妙與道合眞蛻去凡骨白日升舉此外藥還如内藥内通外亦須通不可偏而不全也然而眞種則一同温養則兩般何也所同者鈆汞是也兩般者火候是也蓋外藥則用凡炭人爲之火内藥則用眞一天然之火也西江月此道至神至聖憂君分薄難消調和鈆汞不終朝早睹玄珠形兆志士若能修鍊何妨在市居朝工夫容易藥非遥說著人須失笑甚矣五百歲間氣生賢無非地靈人傑凡道德勳庸文章政事所以致君澤民者世不乏人若夫至神至聖爲人中仙陰功陽德上合天心白日飛舉者實難得其人也儻非夙有靈骨福分深厚疇以得此使其分所當得遭遇聖師則至神聖極容易蓋金丹神聖之道不過鈆汞二物一能調和火候則片餉之間玄珠形兆有志之士若能精勤修鍊初無貴賤之别在朝不妨爲治國平天下之事在帀不失爲士農工商之業如前詩謂休妻謾遣陰陽隔絶粒徒教腸胃空心肝脾肺腎之五臟徒勞存想涕唾精津氣血液之七寳謾費吐吞凡三載九年之限程三千六百之旁門皆非金丹之用吁道則至神至聖藥則容易非遥所謂道在眼前人不見說教失笑更何疑太上曰下士聞道大笑之不笑不足以爲道也西江月白虎首經至寳華池神水眞金故知上善利源深不比尋常藥品要假修成九轉先須鍊己持心依時採取定浮沉進火仍防危甚白虎者金精也首經者元首谷神也至寳者靈明寳藏也華池者偃月爐也神水者神明之水也眞金者金丹大藥也上善者無上之妙道也利源者無窮之利源也九轉者九還之金體也鍊己持心者七寳之無漏身也採取者採有時取有日也浮沉者陰陽升降之二物也進火防危者丹熟不須行火候也古仙曰金丹之術百數大要在神水華池然天一生水水豈自然必金能生水是金剛不壞萬古常存得天一至眞之氣而生水故金精爲首經至寳華池旣生神水神水復生眞金所謂母隱子胎水中金水鄉鈆是也太上曰上善若水陰符經曰絶利一源吕洞賓曰七返還丹在人先須鍊己待時必當精氣神全三田俱足與天地合德陰陽升降每月那日每日那時輕輕採取無過無不及定其浮沉奪天地造化機緘合符毫釐不爽如丹已成就則守恬養氣不可妄亂進火鍾離仙曰丹熟不須行火候若還加火必傾危是也西江月七返朱砂返本九還金體還眞休將寅子數坤申但看五行成準本是水銀一味周流經歷諸辰陰陽炁足自通神出入豈離玄牝七返九還之論乃金丹大道之玄學者不遇聖師妄自臆說或者乃以十二支神從子數至申爲九還自寅數至申爲七返非也龍虎上經曰丹術著明莫大於金火金火者日月之魂魄上半月初三日月哉生魄其體屬金金數四成數九所謂三日更生兊尸開黑銀𤇨出白銀來此金氣發生名曰九還也下半月魄光漸减日當受符日爲火又名朱砂外赤而内白復盜月之光添日之眞火火數二成數七名曰七返然還返之義雖曰金火究其源宗本是水銀一味而已蓋天一生水水爲丹母凡天地之運動日月之升沉皆在水輪之内人身之陰陽造化在於坎水之鄉自其子初陽生午後陰降周而復始經歷諸辰周天氣足自然通神然出入之間豈離玄牝蓋谷神不死是爲玄牝玄牝之門爲天地根此金丹之玄妙也西江月若要眞鈆留汞親中不離家臣木金間隔會無因須用媒人勾引木性愛金順義金情戀木慈仁相吞相啖却相親始覺無中有孕修鍊金丹不出鈆汞二物然汞多飛走實難留停惟得眞鈆則汞可留住蓋是一氣所鍾親中家臣初非異類自相眷戀也奈何大朴旣分東震西兊木金間隔無因相會爲一今以丹法鍊之須用媒人勾引乃黄婆匹配之義以中宫土爲用也蓋土能生金金能尅木木能尅土三姓異質相吞相啖却能相親此五行顛倒之法陰符經云害裏生恩是也仙經云順則成人逆則丹用蓋相生者爲順爲恩而相尅者爲逆爲害也始覺無中有孕者蓋金木之質外别於形而木液金精内感於氣所謂鑿開混沌髓擘出坎離精即此爲丹則無中有孕可知矣太上曰恍恍惚惚其中有物非孕而何西江月二八誰家姹女九三何處郎君自稱木液與金精遇土却成三姓更假丁公煅鍊夫妻始結歡情河車不敢暫留停運入崑崙峰頂二八者陰數也姹女者陰女也九三者陽數也郎君者陽男也木液者東方震龍之液水生木之象也金精者西方白虎之精金生水之象也土者戊己中宫也丁公者火候也河車者北方正氣爲河車般運之象也崑崙者泥丸宫神室也平叔此篇說盡金丹道地火候藥物實慈悲引接人自不明耳且純陽者爲天爲仙純陰者爲地爲鬼陰陽俱備者爲人況一陰一陽之謂道繼之者善也成之者性也大易深言之何異金丹之道乎蓋金丹在人之身不出陰陽之用故以數喻之則有二八三九以人喻之則爲郎君姹女以五行言之則有金有木以四象取之則有龍有虎以人事譬之則爲夫爲妻千章萬句皆是設象寓言無他自元始祖氣混沌爲一太極旣判分列爲二惟其分也則奇偶異數男女異體金木異質東西異方龍虎異象今旣欲返本還原鍊而爲丹則必合異而歸於同若非歸於中宫則二者何縁合一故曰遇土却成三姓乃中宫黄婆匹配之地也雖然二物有形有質豈能果作一處不過以精液交感神氣混融隔礙潜通如磁石吸鐵自然一點眞陽靈明洞照而已故不曰木而曰木液不曰金而曰金精其義深矣然金木豈能自有精液哉須假丁公煅鍊火候抽添則陰陽始得交媾金水始得成丹是火也非己巽風火也非離午心火也乃坎宫北方正氣號爲河車般運不停直上泥丸崑崙峰頂一點眞陽洞明宇宙所謂沉歸海底去抱出日頭來一撞三關透徹無上則赫赤金丹成於金木交并之際仙道豈遠哉紫陽眞人悟眞篇請義卷之六
