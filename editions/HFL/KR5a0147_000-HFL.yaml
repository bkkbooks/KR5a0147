body:
  text: 紫陽眞人悟眞篇講義序吕四天台眞人張平叔作悟眞詩百餘篇行於世識者謂參同之後纔有此書予閑中雖頗涉躐然未能識其妙處雲峰夏宗禹自永嘉來游幔亭示余所爲悟眞講義章剖句析讀之使人煥然無疑顧方掩關謝賓客不能從君從容咨叩以盡其妙然以君之爲人材智磊落蓋嘗入山東幕府奉檄走燕齊間功名之志銳甚年未五十顧欲捐棄軒冕從安期羡門爲海山汗漫遊其亦太蚤計矣予頃聞道家言學仙至難唯大忠大孝不竢修鍊而得其說渺茫荒恍未易測知然使天上眞有仙人必忠臣孝子爲之非可幸而致也今以君之才雖不求用世將有不吾置者勉爲明時植立功業報國榮家忠孝兩盡然後從君鼻祖夏黄公戲橘中遨商山無不可者君又有陰符講義諸書留茂潜樓賜叔已爲之序引故不復云於時寳慶三年冬至後三日建安眞德秀序吾鄉諸儒以經學見推文翰自命者多矣未有能傳張平叔悟眞訣者夏君宗禹廼獨因祕受坐進此道斯亦異矣君少有奇抱謂功名抵掌可致自其二十年間徧入應賈許三師幕且與苟夢玉同艱難繇青齊跨太行深入韃境極其勞瘁旣而事與願違始屏迹絶口不復道著爲藥鏡陰符悟眞三書羽流至有投誓而願受業者予嘗諗君古人功成名遂如泛五湖從赤松遊者迄無一字可傳君今得無以言爲累耶君對以吾非自能高舉遠引者推吾之志將盡欲天下後世人皆能返老還童出凡入妙而後已吾何愛於言也此論尤高宜加敬歎時紹定初元仲春祕書少監永嘉曹叔遠序何以爲道皆本諸身長生不死之藥誰能於吾身之外得之坎離震兊吾身之物也金木水火吾身之物也交梨火棗吾身之英瓊漿玉液吾身之精千形萬狀不出吾身惟常人知方保護之術不能運化至人獨有顛倒之法故守眞抱一龍從火裏出虎向水中生不顛不倒何以成道七返九還妙品也八歸六居神品也張平叔知之夏宗禹知之壽張老人望洋而歎者也紹定初元孟冬吉日祕書郎中四明張宓子伏序
