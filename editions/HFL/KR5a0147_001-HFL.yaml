front:
  text: 紫陽眞人悟眞篇講義卷之一
  hash: sha256:9dcfb80d8b36a3d6113e55d57dc2d40d6ed4927c0963912a0bb42c7415c6238b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0147_HFL_001-001a, image: hfl/0066/0066-010.png}
body:
  text: 雲峯散人永嘉夏宗禹著七言四韻詩一十六首以象二八一斤之數不求大道出迷途縱負賢材豈丈夫百歲光陰石火爍一生身世水泡浮唯貪利禄求榮顯不顧形容暗顇枯試問堆金等山嶽無常買得不來無西山會眞記曰名利不可不求之自有定分識破者自無縈絆恩愛不可不作作之自有縁業識破自無牽纏況人生百歲七十者希夢幻泡影曾無定據昩者徒知利禄榮顯堆金積玉以爲永久享用殊不知形容暗顇難買無常溘然朝露之時則利禄堆金於我何益哉惟大道有常超出物表不生不滅無去無來其在世也視物無心其厭世也棲神有道利禄不可汩金玉不可汙歲月不可老無常不可來豈不誠大丈夫哉不然古聖何以曰神仙可以學得不死可以力致乎人生雖有百年期壽夭窮通莫預知昨日街頭猶走馬今朝棺裏已眠屍妻財抛下君非有罪業將行難自欺大藥不求争得遇遇之不鍊更愚癡生死晝夜理勢之常惟以道自持則雖死猶生況神仙長生不死者乎故朝聞道夕死可矣非謂其聞道而反得速死也蓋雖死猶生也尸解飛升謂其有幻化也蓋神仙能出死入生者也昩者不知徒馳騖於利慾之場朝不保暮妻財棄去罪業隨身平叔深憫之也苟或知之則必求大藥以免是患可也然是藥非外求也所謂人人自有長生藥者也特不遇師以指明之耳儻或遇師而復不能修鍊則石火光陰易於生老病死豈不愚癡也哉此法眞中妙更眞都縁我獨異於人自知顛倒由離坎誰識浮沉定主賓金鼎欲留朱裏汞玉池先下水中銀神功運火非終旦現出深潭日一輪悟眞之詩代太上宣明金丹祕㫖然首二篇止勸世其實此篇爲談玄之首解注者不知幾人皆不能推明其藴何以指迷後學無他饒君聰慧過顔閔不遇眞師莫强猜也夫眞中之妙妙中之眞學者以爲形容大道之助語耳不知金丹玄奥正欲别於眞凡得其眞者與天地合德造其妙者雖鬼神莫知或墮於凡則悖道傷生矣雲房曰些子天機論炁精此眞眞外更無眞藥鏡曰從縁得至眞能顯化通神故平叔拳拳以眞凡爲訓旣曰不識眞鉛正祖宗又曰好把眞鉛著意尋旣曰若要眞鉛留汞又曰内有天然眞火與夫用鉛不得用凡鉛用了眞鉛也棄捐無非使人别眞凡之異是明道之本乃修金丹之門户烏可略而不思哉且離南午也爲陽爲火坎北子也爲陰爲水陽火炎上陰水潤下上下若睽而不交也然離中一爻爲耦是外陽内陰之象則陰負陽而趍下陰降而陽亦降矣坎中一爻爲奇是外陰内陽之象則陽負陰而趍上陽升而陰亦升矣雖然此陰陽升降之義非顛倒坎離法也世人徒泥於此往往以心爲離以腎爲坎使心腎相交水火旣濟便執爲金丹作用非也此特安樂法也蓋心腎有形有質有盛有衰何以爲道惟神仙能虚坎實離以爲顛倒之法何者太極未判有物混成孰爲離孰爲坎自天一生水地二生火水火旣分坎離始畫故二陰抱一陽爲坎坎中滿外象水也而陽火生於其中神仙必鍊此陽以虚其中而起其火爲金丹之用二陽抱一陰爲離離中虚外象火也而陰水生於其中神仙必鍊此陰以實其中而聯其爻爲純陽之體故坎之虚則爲坤離之實則爲乾此乾道變化各正性命取將坎位心中實點向離宫腹裏陰者是也若夫心腎相交水火旣濟何關於此哉至於浮沉賓主之說尤非寓言是人身有物一浮一沉一賓一主氣脉潜通曾無間斷茍沉者一損則浮者亦損矣爲主者一虧則爲賓者亦虧矣是以欲留朱汞於金鼎必先下水銀於玉池則根榮而末茂源深而流長者也然而汞鉛二物不能自爲造化必假神功之火抽添運用方得玄珠成象赫赤成丹曾不終朝道果圓就矣海蟾公曰沉歸海底去抱出日頭來豈非深潭日輪之現矣得道如此則信我獨異於人也此篇說盡金丹骨髓漏泄天機學者能因文解義則目擊道存不在三千六百門矣虎躍龍騰風浪麤中央正位産明珠果生枝上終期熟子在胞中豈有殊南北宗源翻卦象晨昏火候合天樞須知大隱居廛市休向深山守靜孤龍陽物也虎陰物也陰陽交媾託喻龍虎片餉工夫玄珠産於正位正位者乃黄中通理之位也譬猶果生枝上子在胞中炁候周天自然誕熟南北宗源翻成卦象即是前說顛倒坎離之義道光曰面南看北斗定裏採眞鉛者是也晨昏火候合於天樞即朝屯暮蒙與天地合德無非自然時候不在坐守庚申吐納子午也得此道者無貴無賤無市無山志士若能修鍊不妨在帀居朝也王鼎眞人曰坎虎離龍龜精鳳髓知君已悟丹頭風燈難保宜早向前修不在存心想腎亦非干孤坐巖陬君知否眼前有藥朝夕自沉浮陽精能捉住些兒妙處豈假多求望曲江澄淨神水西流金木無令間隔陽魂與陰魄相投鴻濛内一輪紅日光耀鼎中收黄芽白雪不難尋遠者須憑德行深四象五行全藉土三元八卦豈離壬鍊成靈質入難識消盡陰魔鬼莫侵欲向人間留秘訣未逢一箇是知音黄芽白雪乃古聖九品上丹取元君木精以水火鼎器不計歲月久久鍊養自然英華結瑞離於砂汞凡質可謂從無入有超凡入聖服之改形换骨便可飛升世人安能識此寳乎以人身内丹言之亦有此二寳也但其福薄行淺者俯仰有愧未易得此故平叔旣勉達道者須修陰功陽德契合天地而復指其不難尋之路謂四象五行皆藉於土三元八卦不離於壬豈非以土生黄芽而壬生白雪也且土位居中其色黄以青龍之木白虎之金朱雀之火玄武之水無土不能全其造化是土爲五行之主滋生萬物吕仙曰震雷發動山頭雨漸澆灌黄芽出土者也壬居水位因金生之其色白其氣寒若天地人之三元乾坤艮巽坎離震兊之八卦皆不能離於壬水水爲金丹之母壬又爲子之初是一陽纔動作丹時也古歌曰修道必水府求玄虚室生白則白雪自壬而生也人能鍊此靈寳銷盡陰魔雖父子不傳信人難識也杳冥莫測信鬼莫侵也雖然人見說土生黄芽便認以脾爲中土壬生白雪便認以腎爲壬水殊不知脾腎乃有質之物譬如砂汞亦有質之劑何以爲變化之靈修丹之士内固不可捨脾腎外亦不可去汞砂要知黄芽白雪乃出於形質之外謂之無中有有中無玄中玄妙中妙不可思議也世人爭名奪利荒淫酒色雖一小安樂法尚不行持欲求大道知音金丹祕訣亦憂憂乎難矣人人盡有長生藥自是愚迷枉擺抛甘露降須天地合黄芽生要坎離交井蛙應爲無龍窟籬鷃争知有鳳巢藥熟自然金滿屋何須尋草學燒茆天地媾精而生物男女媾精而生人其生生化化本本原原無仙無凡無貴無賤皆受一點眞陽之炁自當三才並立而長生住世也惟人之愛河慾海流浪滋深晝夜擺抛尾閭不禁一時恣情快樂那知百歲修眞眞愚迷亦甚矣故平叔憐之謂長生之藥人身自有甘露黄芽即其實也自天炁下降地炁上騰冲和薰蒸則甘露降矣離納戊土坎納已土水火往來會於中黄之位則黄芽生矣此非身外事也而下士聞道必大笑之亦如井蛙寸跳於勺水籬鷃卑飛於蒿萊不知滄海有龍宫鄧林有鳳巢何足責哉惟有道者修此大藥時飲甘露日採黄芽火候抽添周天數足則回陽换骨神光發現金相端嚴與道合眞矣陰眞人曰到得黄芽處黄金滿我家何必尋草燒茆以變外爐之物哉好把眞鉛著意尋莫教容易度光陰但將地魄擒朱汞自見天魂制水金可謂道高龍虎伏堪言德重鬼神欽已知壽水齊天地煩惱無由更上心金丹大道不出鉛汞二物舉世無人知者何也太上曰以鉛爲君以汞爲臣鉛若不眞汞亦難親古歌曰只恐鉛不眞鉛眞藥自成世人往往以鉛者北方正炁一點陽精是也殊不知其中有眞有凡眞者與天地合德凡者與犬彘同行况鉛汞雖分其本一物鉛能生汞汞復生鉛七反還丹是也苟不著意推尋求師訪友得其金篦刮膜則生老病死實蹉跎於石火光陰中矣儻若知此則將天魂地魄金鉛火汞互相制伏則道德可修矣蓋天之魂爲陽爲日爲火爲汞地之魄爲陰爲月爲水爲鉛皆鉛汞異名也但以地魄擒制火汞是陰能制陽也以天魂制伏水金是陽能伏陰也一陰一陽之謂道日月交合之謂丹則道何患不高德何患不重雖幽顯異類自可伏龍虎而欽鬼神矣宜其壽齊天地超出物表何有塵世之憂惱哉休鍊三黄及四神若尋衆草更非眞陰陽得類歸交感二八相當自合親渾底日紅陰怪滅山頭月白藥苗新時人要識眞鉛汞不是凡砂及水銀三黄者雌黄雄黄硫黄者也兼以水銀珠丹砂則四神也衆草乃燒鍊之藥皆外丹作用世人不能守眞抱一反求諸已内竭精氣外服靈丹是揚湯止沸抱薪救火未有能生者也固非謂丹之不靈服之無益也平叔曰裏面若無眞種子猶將水火煮空鐺是也且三黄四神乃眞仙内丹已成積功累行厭居塵世將欲解化奈何軀殻本是父母遺體因其精血臭腐生爲神奇必當賴外丹點化使之改形换骨補足陽神方能乘虚步氣跨鶴騰雲今聲色凡流以多資而鍊藥以虚憊而求助謂之陰陽得類可乎謂之二八相當可乎蓋有内丹方服外丹以我純陽之身賴彼純陽之劑是得類也譬若以我之半斤稱彼之八兩是相當也如此則潭底之日赫赤輝光山頭之月恍惚有象正是一浮一沉氣脉相通見之不可用用之不可見時人要識此理當求眞鉛眞汞不用凡砂水銀也紫陽眞人悟眞篇請義卷之一
