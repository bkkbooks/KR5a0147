front:
  text: 紫陽眞人悟眞篇講義卷之三吕六
  hash: sha256:dca91627a7c9fdaf5f9362b2cbd60e598a791148da227ab5699828c885f72e15
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0147_HFL_003-001a, image: hfl/0066/0066-064.png}
body:
  text: 雲峰散人永嘉夏宗禹著絶句詩六十四首以應六十四卦之數先把乾坤爲鼎器次將烏兔藥來烹會驅二物歸黄道爭得黄芽不解生乾爲天坤爲地乾爲陽坤爲陰天之陽在上地之陰在下上下旣定則鼎器之形具矣烏爲日兔爲月日爲陽月爲陰日之陽生於東月之陰生於西東西旣分則藥物必間隔矣黄道者中五之正位也黄芽者金丹之靈苗也在天地以乾坤爲鼎器則吾身之鼎器得不體乾坤之用乎天地以烏兔爲藥物則吾身之藥物又豈不烹烏兔之精乎然有旣濟之鼎器有未濟之鼎器俱不能忘水火之功故烹鍊金賴於水火而水火不能以自存必資土德以成之若無戊已不成丹也茍能日鍊時烹驅使二物歸於中宫眞土之位則金丹大藥如芽糵生長日受東風和氣而到純陽境矣所謂心花發明道果圓就大如橘甜如蜜者皆此黄芽滋生也安爐立鼎法乾坤煅鍊精華制魄魂聚散氤氲成變化敢將方體預言論爐安於外鼎立於内雖法象在器實乾坤之體也故假此鼎器以烹鍊藥物則日之精月之華日之魂月之魄使二物聚散一氣氤氲以成變化則金丹可就矣曷敢以方體而預言哉故神無方而易無體即玄中之玄妙中之妙非口耳之學也此内外二丹作用一同其無方無體之妙不可思議不可言述學者有縁則心傳口授一得永得不立文字直指玄關上乘而立躋聖位平地登仙矣休泥丹竈費工夫鍊藥須尋偃月爐自有天然眞火養不須柴炭及吹嘘丹道深矣有内丹有外丹内丹者鍊日月之華聚元神之正乃返本還原上道也外丹者取眞鉛眞汞火候抽添以成長生藥物也茍有内丹而無外丹則道雖可得而形軀沉滯未逃寒暑不能飛升須得外丹踈家臣兔兒眞汞陽火木液張騫陰汞眞火雪胎嬰兒内丹陰丹玄珠火龍後天氣己汞火天地子氣陽裏陰精元陽之氣金液還丹陰中陽火離官腹内金液大還東陽造化爐靈胎中神室靈胎中鉛汞紫陽眞人悟眞直指詳說三乘秘要母也若能抽添運用進火退火升降契天地交合如日月火候調和不差毫髮自然黄芽結秀瑞氣氤氲金丹成寳當與天地相畢矣嚥津納氣是人行有物方能萬物生裏面若無眞種子猶將水火煮空鐺津者水也氣者火也人之一身津以潤之氣以運之水火交養可以長生自其嗜慾滋熾竭盡水火之本原則眞精旣耗如樹木無根雖沾雨露亦不能自植矣今眞元旣無徒然嚥津納氣譬猶水火煮一空鐺非徒無益而又害之論至於此則保合太和各正性命者非陽剛純全乾健不息其孰能與於此調和鉛汞要成丹大小無傷兩國全若問眞鉛何物是蟾光終日照西川金丹以鉛汞而成鉛汞以兩全爲妙儻一偏勝不能調和則不傷於大必傷於小二氣盈虧何以成丹昩者乃以陽尊爲大陰卑爲小又以小往大來爲一陽來復之無傷皆是穿鑿殊不知金丹無獨成之理必用一鉛一汞自分兩國要當調和火候合爲一處方結成丹故曰異名同出少人知兩者玄玄是要機也若問眞鉛之名狀正如蟾魄之光終日照於西川蓋蟾魄者月之水也西川者坤申之金也龍虎經曰三日月出庚西分於卯酉是金生水之象月之蟾魄方生也月旣爲水屬陰其陰則暗不能自明必假太陽之火而後明故終日有蟾光也譬如銅鐵之鏡新鑄出模塊然昏暗何嘗有明可以照物惟加以鉛錫則光明發越與日月争光無他銅鐵者陰也鉛錫者陽也是陰假陽而後明也參同曰日合五行精月受六律紀者是也未鍊還丹莫隱山山中内外盡非鉛此般至寳家家有自是時人識不全大隱居廛小隱在山蓋廛者十日所視十手所指乃城帀闤闠之所萬寳百物之所聚隱者居之則丹事易辦非曰外丹也譬如人之一身亦有廛市之地乃百骸百脉之所會七寳六陽之所居修眞者於此用力則可還丹矣若夫山者幽深遠僻處於至陰何足隱也亦如人之修丹不求至陽乃求至陰如雲房先生謂涕唾精津氣血液元來七者皆屬陰豈非山中内外盡非鉛乎平叔謂人欲還丹當修眞陽不當修至陰眞陽之寳有生咸具無貴無賤無小無大無僧無道無凡無仙如吾儒謂有物有則秉彝具存即是至寳家家有之說竹破須將竹補宜覆雞當用卵爲之萬般非類徒勞力争似眞鉛合聖機方以類聚物以羣分大易嘗言之矣矧金丹大道不出吾身之内其機緘默應與天地同符要當尋根摘蔕反本還原則至道不繁矣若萬般非類不識眞鉛之陽是綴花求其結果於道何有哉故知有竹可以補竹有雞可以覆卵有眞鉛可以合聖機何也譬之有元精可以補元氣有元氣可以補元神皆出自然感化之道以眞陽而攝羣陰若用凡鉛非類之物則徒勞耳用鉛不得用凡鉛用了眞鉛也棄捐此是用鉛眞妙訣用鉛不用是誠言古仙云狐兔不乳馬燕雀不生鳳種禾當用粟鍊金必以金又曰鉛爲芽母芽爲鉛子旣得金花棄鉛不使是知鉛母有眞凡之異用否有先後之殊要當以母而養子則必用眞鉛以肇丹基及生子之成材則必棄鉛母而獨立古歌丹訣云養子成龍意氣高却嫌元母是庸囂是也此論外丹工夫學者當體爲内丹之用譬之存心想腎惜氣鍊精皆是用鉛之意及造金丹上乘大道無爲則心肝脾肺腎精津氣血液皆使不著故用鉛不用是誠言虚心實腹義俱深只爲虚心要識心不若鍊鉛先實腹見教守取滿堂金心虚則一塵不染可以養性腹實則至寳不虧可以養丹此修眞者安手下脚之地也然世人心欲虚而返實腹欲實而返虚何也吾觀其心之實者百念蝟集妄想顛倒姦貪嗔癡逐物忘返何嘗自識其心其腹之虚者恣意情慾以妄爲常傾瀉眞元朝暮取樂何嘗能實其腹故平叔憫之於虚心實腹之事兩致其戒必不得已而先其所當先則實腹爲不可緩矣無他人心未易虚也虚則與天地同量造物同遊吾夫子七十而從心所欲不踰矩其虚豈易至哉若夫實腹則容可先也茍能薄於聲色寡於嗜慾保眞元護精氣則鉛爲可鍊腹爲可實也金寳滿堂亦能長生住世矣夢謁西華到九天分明授我指玄篇其中簡易無多語只是教君鍊汞鉛平叔曰學仙須是學天仙蓋天仙者離去洞府位列九天乘雲御風驂鸞駕鶴陟降帝所雖大地山河囿於劫運而天仙之快樂無爲劫運不能囿是果何修而致此哉其㫖玄微其法簡易不過鍊汞鉛二物而已故學道之人精誠所格發於夢寐西華天門可以朝謁故天仙敬授以指玄之篇而使之鍊鉛汞之大藥其中簡而易行非若三千六百旁門之多事也道自虚无生一氣便從一氣産陰陽陰陽再合生三體三體重生萬物昌大朴未散有物混成孰爲陰陽孰爲萬物耶自道生一一爲太一含眞之氣一生二二爲陰陽闔闢之形二生三三生萬物散殊矣學者誠能原始要終知大道无名本於一氣則取一氣於杳冥恍惚之内以造化金丹則陰陽感合如天地之萬物化生當與天地相畢而鼎立爲三才矣坎電烹轟金水方火發崑崙陰與陽二物若還歸一處自然藥熟遍身香坎者水也電者火也烹轟者擊摶之聲也金水方者西北之位也火發者純陽上蒸也崑崙者峻極于天之山乃日用遊行之地也陰與陽者一陰一陽之謂道也二物者烏兔之物也歸一處者交感之宫也藥熟身香者金丹成之效驗也玄哉妙哉此詩說盡大道之骨髓皆無爲中有爲罔象中有象無非自然之理如地雷復于子其卦屬坎坎中有電是水中起火陰陽相擊其聲烹轟也然火必炎上其勢必發於崑崙崑崙雖高乃有陰陽二物若能調此陰陽合此二物歸於一處自然大藥成熟遍身有香此玉在山而木潤珠生淵而崖不枯也離坎若還無戊己雖含四象不成丹只縁彼此懷眞土遂使金丹有返還參同契曰坎納戊土離納己土然離爲火火從木生蓋木爲青龍火爲朱雀也坎爲水水從金生蓋金爲白虎水爲玄武也離坎雖二體其中含四象儻不以中宫之土配之則水火相激不能成丹矣蓋四象雖是水火木金而四辰乃是子午卯酉如北子爲水子有女土蝠南午爲火午有柳土獐東卯爲木卯有氐土狢西酉爲金酉有胃土雉是知四象彼此各懷眞土金丹方有返還若無戊己不成丹者是也日居離位翻爲女坎配蟾宫却是男不會箇中顛倒意休將管見事高談日爲太陽居於離南午位宜爲男也今反爲女蓋離中虚乃陽中之陰也月爲太陰配於坎北子位宜爲女也今反爲男蓋坎中滿乃陰中之陽也參同契曰坎戊月精離己日光以太陰之月得坎戊水土之陽者而發輝之則精明矣以太陽之日得離己火土之陰者而資助之則光耀矣此一陰一陽之謂道五行顛倒之謂丹至理幽微非師莫喻儻管見無知則談河無益矣取將坎位心中實點化離宫腹裏陰從此變成乾健體潜藏飛躍盡由心虚坎實離之祕即非水火旣濟心腎交養之說其義已詳於自知顛倒由離坎之篇從此變成乾健體者其說亦詳於種向乾家交感宫兹不再迷然平叔尤謂潜藏飛躍盡由心者蓋以大易之乾六畫其象爲六龍乃純陽之卦也初爲潜藏次爲飛躍皆由吾心之用亦如修此金丹自純陰而鍊爲純陽則與乾健之體等爾震龍汞自出離宫兊虎鉛生在坎方二物總因兒産母五行全要入中央木液金精象爲龍虎東震西兊卦祖坎離龍汞出於離宫是木生火也虎鉛生於坎宫是金生水也然火豈從虚而生必依於木水豈從空而有必賴於金金木各隱於水火之中是母隱子胎也雖然五行非土不成造化是以旺於四季者各一十八日始成一歲之功況金木間隔於東西水火迥别於南北若非中宫土德以配之則去道遠矣故曰自稱木液與金精遇土却成三姓又曰離納己土坎納戊土若無戊己不成丹也赤龍黑虎合西東四象交加戊己中復姤自然能運用金丹誰道不成功龍者木也虎者金也合西東者金木無令間隔也四象者青龍白虎朱雀玄武也戊己者中宫之土位也交加者是四象合於中宫若無戊己不成丹也復者一陽生也姤者一陰生也人能於陰陽升降之初妙其運用與天地合符則金丹何難之有陰眞人謂至神聖極容易者是也西山白虎性猖狂東海青龍不可當兩手捉來令死鬥化成一塊紫金霜西者兊也山者土也白虎者金也是土生金其象爲虎也東者震也海者水也青龍者木也是水生木其象爲龍也然金虎在西木龍在東其勢間隔何以爲道是必兩手捉此二獸令其死鬥則二氣感合化成一塊金霜然龍虎爲託象兩手亦寓言固非眞有所執也亦須握固存神使猖狂者歸化不可當者馴服則赫赤金丹頃刻而成矣華嶽山頭雄虎嘯扶桑海底牝龍吟黄婆自解爲媒合遣作夫妻共一心華山者西山也雄虎者剛金也土生金之象也扶桑者東海也牝龍者柔木也水生木之象也東西異位金木異質若不可合爲一也惟黄婆之土歸於中宫自解爲媒娉使金木無令間隔先舉西來後合東則二物歸於一處如夫妻共一心也月纔天際半輪明早有龍吟虎嘯聲便好用工修二八一時辰内管丹成月盈則魄滿月虧則輪半是上弦金半斤也此正初七八之時月竊日之陽魂光明漸長早有龍吟虎嘯之象龍屬震震爲木虎屬兊兊爲金金能生水木能生火金木相尅水火交戰故龍必吟而虎必嘯便好用工以修二八則丹必成矣何謂二八非卯酉之二八門也非二八爲一斤數也正是以二合八其數爲十乃天地造化之大數五行生成之總括也故天一生水地六成之地二生火天七成之天三生木地八成之地四生金天九成之天五生土地十成之此天一地二天三地四天五地六天七地八天九地十之數彌綸天地之常經攢簇五行之造化學道者於此得其徼妙則片餉工夫玄珠成象眞人出現金丹之成何難之有所以一時辰内管丹成也紫陽眞人悟眞篇請義卷之三
