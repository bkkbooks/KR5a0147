front:
  text: 紫陽眞人悟眞篇講義卷之七吕十
  hash: sha256:9d1969ddea2f23605b5ecd50ad016e730413c722dea4ac217dacc8d8276e5cea
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0147_HFL_007-001a, image: hfl/0066/0066-170.png}
body:
  text: 雲峯散人永嘉夏宗禹著西江月牛女情縁道本龜蛇類禀天然蟾烏遇朔合嬋娟二炁相資運轉總是乾坤妙用誰人達此深淵陰陽否隔却成愆怎得天長地遠牛女者夫婦之義也龜蛇者水火之象也蟾烏者日月之精也乾坤者天地之對也此一陰一陽之謂道日月交合之謂丹有陽而無陰則陽無以化有陰而無陽則陰無以生二氣相資運而變化或分或合妙用無窮故如牛郎織女情義縁合爲道之本水龜火蛇坎離交媾類禀天然月蟾日烏遇朔必合嬋娟久照乾天坤地覆載廣大妙用神通人以一身與天地並立爲三才亦以陰陽二氣匹配而成道曰玄牝曰鈆汞曰龍虎曰烏兔曰金木曰水火曰黑白曰東西曰坎離曰夫婦不可枚舉無非陰陽交感之義茍陰自爲陰陽自爲陽否隔不通則成愆過而夭折矣何以出死入生與天地相與長久哉西江月雄裏内含雌質負陰却抱陽精兩般和合藥方成點化魂靈魄聖信道金丹一粒蛇吞立化龍形雞飱亦乃變鸞鵬俱入清陽眞境一陰一陽之謂道合日與月之謂丹然而日爲陽爲火内有壁月烏乃雄裏含雌也月爲陰爲水内有房日兔是負陰抱陽也蓋烏屬庚辛金兔屬甲乙木毋令間隔則日之魂月之魄兩件和合於一處則至靈至聖玄珠有象金丹成於片餉之間譬之外藥亦同陰陽匹配點化成丹蛇雞服餌亦化龍鸞況於人乎況得道乎此内外二丹無非以陽精爲主不問人禽異類茍能以陰鍊陽使其魂靈魄聖則一粒金丹蛇服成龍雞飱成鳳人服登仙俱入清陽眞境矣西江月不辨五行四象那分朱汞鈆銀抽添火候未曾聞早便稱呼居隱不解自思己錯更將錯路教人誤他永世在迷津似恁欺心安忍五行者金木水火土也四象者青龍白虎朱雀玄武也朱汞者砂中取汞也鈆銀者鈆中取銀也火候者眞陽之火節符之候也平叔謂學者妄亂以肺爲金以肝爲木以腎爲水以心爲火以脾爲土又以肝屬青龍肺屬白虎心屬朱雀腎屬玄武此爲五行四象修鍊金丹可謂無所辨别那分朱汞鈆銀亦非捨一身之外而别謂五行四象譬之鈆砂爲有質之物五臟亦有質之形如何可以成道惟於有形質之中而得其無形質之用則自粗造精超凡入聖始得鈆汞之祕矣雖然縱識朱砂及黑鈆不知火候也如閑況不識不解而錯以教人所謂迷迷相引無有出期如此用心尚安忍哉西江月天地纔經否泰朝昏要識屯蒙輻來凑轂水朝宗妙在抽添運用得一萬般事畢休分南北西東損之又損慎前功命寳不宜輕弄天地交而爲泰是上陰下陽也不交而爲否是上陽下陰也雲雷屯君子以經綸是物之屯難始生不可牋賊也山下出泉蒙君子以果行育德是泉之始達當蒙以養正也即此四卦之義託喻金丹正合其宜或者以六十卦分爲三十日以乾坤坎離四卦爲鑪鼎抑何穿鑿牽强也殊不知一陰一陽之謂道否泰屯蒙之謂功以金丹言之全在陰陽交媾之精儻若天自天地自地否塞不通不能交而爲泰則陰陽何以爲道大藥何以成丹至於朝屯暮蒙即是謹於持守常若屯難養蒙之時不可一念差失不可一時恣縱戒謹乎所不睹恐懼乎所不聞實不忘於朝昏頃刻間也若能如此修爲則輻來凑轂如車之運行初無敗闕如水之流轉萬折必東故眞一先天之氣機緘相應符節不爽抽添運用妙斡天機得此眞一命寳當持盈守成而矣抱朴子曰人能守一一能守人人不能守一一能去人豈非命寳不宜輕弄乎西江月冬至一陽來復三旬增一陽爻月中復卦朔晨超望罷乾終變姤日又别爲寒暑陽生復起中宵午時姤象一陰朝鍊藥方知昏曉一年有三百六十日以六陰六陽盈虧消長攢簇於爻象之間有年中冬至月中冬至日中冬至六位相乘陰陽相盪十二卦備則天道明而周天火候足矣且年中冬至陽生於子是十一月用地雷復卦爲一陽爻十二月建在丑用地澤臨卦爲二陽爻正月建在寅用地天泰卦爲三陽爻每月三十日换一卦以進火符是三旬增一陽爻乃一年卦氣周天之候也夫攢年簇月爲月中冬至者以一月三十日一日十二時共得三百六十時耶準一年三百六十日却以初一日爲復卦每二日半共坎卦至十五爲乾純陽卦然陽極則陰生至十六日爲望用天風姤卦以退火符乃陰長陽消所謂望罷乾終變姤乃一月日卦數準一年周天之候也若夫攢年簇日爲日中冬至者以一日十二時分爲陰陽升降之節以子初陽生爲冬至以午後陰生爲夏至亦以一時辰爲一卦用復姤進退陰陽之始也用乾坤變化陰陽之終也晝夜循環於百刻之内以時易日法神功亦象一年卦數周天之候也修眞之士外立表漏以測天運之晷刻内修眞一以驗本身之刻漏旣知一年之冬至夏至如此又知一月之冬夏二至如此又知一日之冬夏二至如此體天法象洞知昏曉神清氣爽百脉和暢雖未能昇舉冲天豈不勝似荒迷酒色與鬼爲鄰者哉此與天地合德與日月合明與四時合叙與鬼神合其吉凶者是也豈異端曲學乎西江月德行修逾八百陰功積滿三千均齊物我與親𡨚始合神仙本願虎兕刀兵不害無常火宅難牽寳符降後去朝天穩駕鸞輿鳳輦天得一以清地得一以寧人得一以靈吾儒之道一以貫之釋氏之教一心即佛道家之法眞一常存今平叔言八百三千之異何耶吁道體則一道用則殊亘古今窮天地推萬有之夥究象數之煩道無往而不在惟修眞者無一不洞曉於心踐履於己如四端萬善之皆備六度萬行之兼修陰功陽德眞積力久物我親寃同仁一視始合神仙本願古語曰欲修仙道先盡人道是也推是心以往則禍患自消虎兕刀兵所不能害跳出世網無常火宅所不能牽上合天心太一賜召如張天師冲舉許旌陽上昇皆是天降寳符詔歸金闕鸞車鳳輦穩駕紫宸此修眞奉道之效大丈夫功成名遂之秋也有志者可不勉旃紫陽眞人悟眞篇請義卷之七
