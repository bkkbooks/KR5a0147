front:
  text: 紫陽眞人悟眞篇講義卷之五吕八
  hash: sha256:fe9d95526b522b7cfd4481314600edc671d97aaadc93fb8fdbda452d95a5c6e2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0147_HFL_005-001a, image: hfl/0066/0066-122.png}
body:
  text: 雲峰散人永嘉夏宗禹著黑中有白爲丹母雄裏懷雌是聖胎太乙在爐能謹守三田寳聚應三台參同契曰知白守黑神明自來抱朴子曰守雌抱一專氣致柔此丹母聖胎也雖然金丹大道固當黑白相扶雌雄相守以成丹母聖胎之功要知太一含眞之氣三田所聚之寳不可少虧故寳聚於三田爐守於太乙精氣神全火候不爽自然聖胎可成丹母可就上應三台之象充實而有光輝矣恍惚難求中有象杳冥莫測是眞精有無從此互相入未見如何想得成視之不見其色聽之不聞其聲摶之不得其形此恍惚杳冥之狀也於道何有哉然而罔象中有象無形中有形虚實生白從無入有旣虚矣而白從何而生旣無矣而有從何而得此玄中之玄妙中之妙非得之踐履應之效驗則難以語此惟於恍惚杳冥之中而見其眞精之象於非有非無之中而見其互爲相入之理則道在我矣苟未見焉則旁門小法謾爾存想如何可以成功乎四象會時玄體就五方行處紫光明脫胎入口身通聖無限龍神盡失驚四象者青龍白虎朱雀玄武也五方者東西南北中金木水火土也大道虚無以金丹爲玄妙金丹雖妙不過攢簇五行合和四象也四象一會則玄體必就五方旣合則丹光必明非曰存心之火想腎之水也亦非日以肝爲龍以肺爲虎也天生人物人生靈寳五行簇於此四象聚於此茍行玄機則烹成大藥脫胎入口超凡入聖無限龍神咸起敬畏豈不盡驚耶此道高龍虎伏德重鬼神欽也華池讌罷月澄輝跨箇金龍訪紫微從此衆仙相識後海潮陵谷任遷移金丹之術百數其要在神水華池蓋華池者鍊丹之池中有神水混混不輟晝夜流通苟得此而嚥之則月凝輝矣吾儒之與日月合明釋氏之圓陀陀光爍爍者是也金是西方兊虎木是東方震龍今也能修眞而跨此金龍則金木無令間隔可以朝上帝出元神豈非訪紫微乎茍得此道則已長生仙舉雖滄海變桑田於我何有哉所以任陵谷之遷移也要知鍊養還丹法宜向家園下種栽不假吹嘘並著力自然果熟脫眞胎人禀陰陽之靈氣合有大丹一斤之數苟無耗散可以與天地相畢惟其六欲七情斲喪天眞故若朝不保暮上聖垂慈以還丹之法教之使其鍊養以盡九還七返之妙初非假於草木之質人爲之偽皆是反求諸己故以四大一身爲家園以陰陽二氣爲種子朝種暮收春生秋殺開花結子果熟胎圓無非自然時候與天地合符初不待吹嘘著力以外務爲勞也休施巧僞爲功力認取他家不死方壺内旋添留命酒鼎中收取返魂漿作德心逸日休作偽心勞日拙修道之士以眞常爲心以正直爲念則反邪歸正出死入生矣苟施巧偽則非心邪念顛倒妄想與死爲鄰矣雖然死生之分在於眞偽之别果何修而致之也惟留命之酒旋添於壼内返魂之漿收取於鼎中不使眞元斲喪本領耗折如燈之有油如木之有根自然光明發越枝葉暢茂其爲不死之方豈欺我哉雪山一味好醍醐傾入東陽造化爐若遇崑崙西北去張騫始得見麻姑此設象寓言言以人身中有雪山能出醍醐珍味蓋山屬土生金金氣寒故曰雪山然金生於土其液流注味甘色白狀若醍醐傾入東陽爐中方成造化蓋東陽屬甲乙之木木中有火火能尅金可以成就至寳其造化玄微凡夫莫測若崑崙峰頂遇西北金水之位使之相生相尅奪天地之造化則陰陽得類自然感合如張騫乘槎逆流而上可以見麻姑之仙矣張騫者陽男也麻姑者陰女也亦寓言匹配之意也不識陽精及主賓知他那箇是疏親房中空閉尾閭穴誤殺閻浮多少人陽精者一身魂神之宰司也人安能識之況有賓有主有疏有親須得師口訣方通玄奥否則御房閉精徒於尾閭用意非矣雲房曰堪嘆三峰黄谷子誤殺南閻多少人蓋三峰者乃陰丹之術固形住世之方非神仙之道也是世人氣血未定對境不能忘情心雖慕道嗜慾難遏古仙垂慈於三千六百門中亦有閉精之術使夫人知生生化化以精氣神爲主操之則存捨之則亡施之於人可以生人留之於身可以生身非劇戲也非可恣也故滄海雖大不實漏巵尾閭不禁人豈長生者乎惟其不得師傳則誤閻浮之人多矣萬物芸芸各返根歸根復命即常存知常妙道人難會妄作招凶往往聞太上曰萬物芸芸各歸其根歸根曰靜靜曰復命復命曰常知常曰明不知常妄作凶平叔之詩專體此意也夫萬物作於性而復於性譬如華葉之生於根而歸於根濤瀾生於水而歸於水一有所歸則靜定而復命守常而不昩外妄盡除泰定光發不與物俱遷不與化俱逝自本而自根常久而不變故易之彖恒曰日月得天而能久照四時變化而能久成聖人久於其道而天下化成恒之時義大矣哉是豈凡俗之人可以曉會耶惟人之難會則往往妄作而招凶自作不靖矣故曰反常曰改常曰異常皆有凶而無吉者也歐冶親傳鑄劍方耶溪金水配柔剛鍊成便會知人意萬里誅凶一電光歐冶子聶古之材士千金鑄劍非有他也亦以金水相生剛柔相配百鍊而成天下無敵也若喻金丹大道是亦鑄劍之法故以人身言之亦耶溪之地有金水之物有剛柔之用苟得師鑄鍊則其鋒不可當自然洞洞屬屬物來能明事來能鑒雖萬里凶頑亦可誅伏於電光之下此明視萬里芒寒色正皆自然之餘效也敲竹喚龜吞玉芝鼓琴招鳳飲刀圭近來透體金光現不與常人話此機此設象寓言皆託譬人身所有之物蓋竹與琴同擊作有聲者是龜與鳳同形狀相類者是玉芝與刀圭同皆和氣所生金土所産也異名雖六本體只三以大道無爲言之初無假於作用然符節相應氣脉相通於無爲中有爲以應天地之機皆自然感合之道故人身中一物敲之如竹則龜可喚鼓之如琴則鳳可招皆聲氣相求呼吸相應速如影響自然和氣致祥則玉芝可吞刀圭可飲其關節脉理貫通上下氣類感召不勞餘力而見驗也宜其金光透體有諸中而形諸外如玉在山而木潤珠生淵而崖不枯至玄至妙曷可與常俗說其玄機哉藥逢氣類方成象道即希夷合自然一粒靈丹吞入腹始知我命不由天同聲相應同氣相求金丹大藥不出鉛汞二物鉛能化汞汞復化鉛七返九還是此外丹也視之不見名曰希聽之不聞名曰夷希夷大道出於自然清靜無爲是也此内丹也有内丹以鍊神必有外丹以鍊形使形神俱妙與道合眞一粒之丹靈明妙用自然超凡入聖出死入生豈非我命在我不在天乎赫赤金丹一日成古仙留語信堪聽若言九載三年者盡是推延款日程金丹大道乃登仙上乘宜若至難也平叔乃謂一日可成豈理也哉又曰都來片餉工夫永保無窮逸樂由是知陰眞人曰至神聖極容易信斯言也則至道不煩初非旁門之多事片餉一日目擊道存若說九載三年謾自推款日程而已所謂操則存捨則亡出入無時莫知其鄉者去道遠矣顔子之如愚曾子之一唯香巖之擊竹善財之彈指儒釋尚尔况平地登仙超凡入聖豈非一日可成乎大藥修之有易難也知由命也由天若非積行施陰德動有羣魔作障縁人與天地並立爲三才何故人多夭折而天地無終窮達者知之必修金丹大道與天地相畢豈細事哉故欲修仙道先修人道人道有媿則仙道遠矣人道者何惟積行救人陰德在世如天地之覆載一毫無私如上帝之好生一念不殺所以仰無愧而俯無怍則自天祐之吉無不利若修大藥以求仙其道甚易皆由我也儻或愧於屋漏欺於暗室則魔障日生其爲難也甚矣非固難也是天所不容也非天故也是無德行以契天心也學道者可不求其易而捨而難哉三才相盜食其時道德陰符顯聖機萬化旣安諸慮息百骸俱理證無爲陰符經曰天地萬物之盜萬物人之盜人爲萬物之盜又曰食其時萬化安其說已詳於陰符講義矣然平叔尤有證無爲之說者蓋以生生化化消息盈虚疑若多事也然大道爲公無非自然之理人能充此以爲用則心同太虚萬慮自息氣涵元始百骸和暢無爲之道可證於太清之仙境矣陰符寳宇逾三百道德靈文滿五千今古上仙無限數盡於此處達眞詮甚矣大道難傳不立文字然而琅函玉笈金誥瓊章如武庫之森列如總龜之備具學道者將孰從而考訂也惟至煩中有至簡之理至詳中有至要之用得非黄帝之陰符經字逾三百太上之道德經文滿五千而大道玄微殆無餘藴今古神仙飛升金闕遊宴玉京者不可勝計也無非於此二經達其眞詮得其妙用學者不可不知其要而求旁門於三千六百也譬之諸子百家傳記雜說充棟汗牛不知其幾也六經之道同歸乾坤之理簡易亦由金丹大道不出陰符道德之二經也饒君聰慧過顔閔不遇眞人莫强猜只爲丹經無口訣教君何處結靈胎大道惟一設教分三自其三而推之則千門萬户千經萬論不知其紀極也由其一而貫之則天得以清地得以寧人得以生至道不繁矣然不知其紀極也似難而實易茍有聰明慧智之姿則旁通博覽若無餘藴惟至道不繁之理雖似易而實難縱有聰慧顔閔之材於此亦難自悟須遇聖師至人親傳口訣指出天機則一言得事片餉成功靈胎可結而大道可致矣了了根源方寸機三千功滿與天齊自然有鼎烹龍虎何必擔家戀子妻了了根源機在方寸三千行滿功與天齊方寸者何此心是也齊天者何亦此心是也心爲天君主宰萬象若了了内明一塵不染修眞奉道行滿三千雖天道杳冥不可測識而對越無愧與天爲徒矣自然有鼎以烹金丹龍蟠虎遶法象著明其藥無涯何必滯於塵俗迷於恩愛擔家戀子困於妻拏而與草木俱腐乎未鍊還丹須急鍊鍊了須還知止足若也持盈未已心未免一朝遭殆辱還丹之法乃長生久視之道世凡塵俗烏能造其妙耶惟仙風道骨者方能知修鍊之法然而藥物火候運用抽添當與天地合符不可知進而不知退知作而不知止故未鍊還丹急須修鍊是吕仙謂下手速修尤太遲也若是鍊了便當保守不可妄加火候若火候失宜則太陽流珠其性猛烈常欲去人未免一朝傾失故殆辱也鍾離謂藥熟不須行火候若行火候必傷丹也由是觀之不知修鍊者是不耘苗者也知修鍊而不知止足者是揠苗助長也可不謹與須知死户爲生户莫執生門作死門若會殺機明反覆始知害裏却生恩生者死之根死者生之根恩生於害害生於恩此陰符經言也平叔此詩無非發明其藴蓋金生於巳死於子子爲水鄉而金能生水木生於亥死於午午爲火地而木又能生火水土生於申死於卯卯爲木位而水又能生木是生者死之根死者生之根也然而生死之根固然而恩害之義却異惟金火之造化不可以生死論也龍虎上經曰金火者眞藥也丹術著明莫大乎金火蓋火生於寅死於酉酉爲金鄉其火但能剋金豈能生金耶況酉爲金旺之鄉而火爲就死之地旣不能剋之爲害而金反以生旺爲恩參同契曰金入於猛火色不奪精光豈非恩生於害乎此殺機反覆之理非洞曉五行造化不可知也或者乃以生門死户爲婦人陰僻之地恩生於害爲交媾損德之術非也大道清靜无爲烏得穢行而可求仙乎禍福由來互倚伏還如影響相隨逐會能轉此生殺機返掌之間灾變福禍兮福所倚福兮禍所伏殆猶影響之應形聲不可忽也人能學道修眞則福德增崇長生乆視爲人中仙此出死入生之妙道也苟背道傷生耽於聲色則行尸行厠自速敗亡而已其機則轉生爲殺變福爲灾持反掌之易爾由是觀之則惠迪吉從逆凶惟影響儒書道書其揆則一修行混俗及和光圓則圓兮方即方顯晦逆從皆莫測教人争得見行藏大隱居廛小隱居山何也廛者市井之地修眞者居之一念不動純誠無雜酒色財氣所不能入富貴功名所不能變兹其所以爲大隱也若夫山者僻靜林麓之野隱者固無異念也逮出遇紛華一見可欲則凡情莫遏嗜慾如初兹其所以爲小隱也平叔謂修行者必混於俗不爲立異之行和其光同其塵隨圓逐方無可無不可或顯或晦或逆或從如雲出無礙人莫能測太虚湛然萬象無累此其所以爲得道也若標表自暴爲驚世絶俗之舉是行藏爲人所見非惟辦道不成其不被害於世者幾希故於六十四詩之終而重垂教於後學也紫陽眞人悟眞篇請義卷之五
