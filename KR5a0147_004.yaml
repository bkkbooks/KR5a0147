front:
  text: 紫陽真人悟真篇講義卷之四吕七
  hash: sha256:1ee0cf2bf9ef05dfeda6eae9f752db0b82da8b84fd236ac3a928aedac510cb5f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0147_HFL_004-001a, image: hfl/0066/0066-092.png}
body:
  text: 雲峰散人永嘉夏宗禹著先且觀天明五賊次須察地以安民民安國富當求戰戰勝方能見聖人夫戰勝之説乃用兵之道今修真之玄乃登仙之道平叔輒混而一之後學得無異見乎陰符經云天有五賊見之者昌此五賊者乃金尅木木尅土土尅水水尅火火尅金五行互相戕賊方成大道要當仰觀乎天以明是道之妙次須俯察乎地以安衆兆之民何為民蓋士農工商者天下之民也而耳目口鼻心肺肝腎者吾身之民也國猶吾之一身也地猶吾身之地位也人能聰明不蔽視聽不擁五臟和平內外交養一身泰然宇定光發是民既安國既富矣當求戰勝之功固非逞干戈以赴敵也亦非採戰為下術也陰疑於陽必戰其血玄黃人身中陰陽晝夜交戰惟聖人能以陽勝陰不為陰邪所蕩此富國強兵之術非聖人孰能與於此哉用將須分左右軍饒他為主我為賓勸君臨陳休輕敵恐喪吾家無價珍此詩學者當存思無邪之志方可諦觀否則難會其意矣金丹大道以陰陽二氣交感而成一左一右一賓一主而又有臨陳之象何也蓋陽極則陰生陰極則陽生陰疑於陽必戰其血玄黃是必用將以統其左右之軍何謂將正心是也饒他為主我為賓何謂主一陽先動時也何謂賓隨其動而應之也我既應之未免有對敵之舉吾見其雷轟電閃虎躍龍驤混合回風絶利一源用師萬倍金丹奏功矣否則動靜失宜輕於進取則大陽流珠其性猛烈元氣走矣豈非喪吾家之無價珠珍乎火生於木本藏鋒不會鑽研莫強攻禍發總因斯害己要能制伏覓金公木能生火火藏於木而不自露人身有火火藏於身而不自知惟善鑽研者可以奪天地之造化故鑽燧以改火則火不在吹噓而在鑽研之工焚身以起火火不在外假而在修養之道陰符經云火生於木禍發必尅是木以火而自焚人以火而自害惟聖人制伏此火從其本始而制之則覓金公以尅木況金能生水而水又能尅火如此則木火不足為吾之禍而反為吾之福矣豈非善鑽研之道乎金翁本是東家子送在西鄰寄體生認得喚回歸舍養配將姹女作親情金生於巳胎養於卯卯屬東方是金乃東家之子也金旺於酉酉為西方是金寄體在西鄰也東西雖異位金木必交並一氣往來初非有異猶嬰兒姹女結為親情何有東家西鄰之間二物終歸一處以成天地之造化此金丹之道玄之又玄妙之又妙也姹女遊行自有方前行須短後須長歸來却入黃婆舍嫁箇金翁作老郎姹女者太陰也太陰者月魄也月魄遊行自有方位龍虎經曰三日月出庚西分於卯酉蓋庚者金也月者水也即金生水之象也庚既屬西方每初三晚日始沒於西方之酉而月却隨後而生於庚是日行在前而月行在後在前者光景須短在後者光景漸長夫短謂日魂既沉長謂月魄漸滿也然或短或長晝夜相須以成天地之造化必得中宫之黃婆則嫁金公作老郎矣蓋黃婆者土也土能生金也向者金能生水而姹女之月魄始盈今又土能生金其造化無窮故金公為老郎也參同謂巍巍尊高是也縱識朱砂及黑鉛不知火候也如間大都全藉修持力毫髮差殊不作丹金丹大道不過鉛汞二物鉛産北方乃天一生水之真汞出南方乃地二生火之妙至真至妙初非外假本來面目百姓日用而不知非心腎也非坎離也非人間水火也非凡鉛凡汞也儻夙生靈骨因文會意識破砂鉛已得金丹之藥物奈何此藥至靈難為烹鍊譬之鉛錫水銀見火飛走如何成丹儻不知火候雖識砂鉛亦無益也蓋火是火候是候學者以火候為一事非也且以外丹言之有文火有武火有插火有寄火有周天火有四正火有既濟火有未濟火與內丹之火無異也五日為一候三候為一氣七十二候為一年此一歲之候也亥至子為陰交陽候巳至午為陽交陰候此一日之候也子與丑交是陽交陰候丑與寅交是陰交陽候此一時之候與內丹之候亦無異也故平叔謂世人縱識砂鉛之正徒得金丹之藥物耳末明火候之祕亦等間耳須要修持至誠不差時刻金丹成矣否則盲修瞎鍊無所師承毫髮差殊金丹遠矣蓋聖人傳藥不傳火不將火候著于文也契論經歌講至真不將火候著於文要知口訣通玄處須共神仙子細論甚矣金丹之難也得其傳者立躋聖位非其人者父子不傳吁非金丹之難也乃火候之難也聖人傳藥不傳火若魏伯陽之參同契諸神仙之藥物論與夫丹經歌詩無非講明真詮之理可謂詳矣而火候一節不曾明言於文字間須遭遇聖師口傳心受則一得永得至道不繁矣況火是火候是候世人懵然不知然火候雖二事而實一理雖一理而實二用若不得口訣何以通玄饒君聰慧過顔閔不遇真師莫強猜故須共神仙子細論也八月十五玩蟾輝正是金精壯盛時若到一陽才起復便堪進火莫延遲八月十五秋氣正中金氣正旺其卦屬兊修真之士必於此時而留意至一陽起後其卦為復是冬至之候便當施功而進火不可遷延恐失時也雖然平叔託喻如此以明金水相生之理非曰每年直待八月與十一月而後修丹其餘月日不可用非也謂一日之間自有秋旺之金精陽生之冬至且陽生於坎其坎屬水水豈自生必金而後生之蓋金至酉而帝旺是八月也水至子而帝旺是十一月也此攢年簇月攢月簇日攢日簇時者是也一陽才動作丹時鉛鼎溫溫照幌帷受氣之初容易得抽添運用却防危人身與天地一同陰陽逐日升降陽氣自夜半子時而升陰氣自日中午時而降修真者當於此時運動天機以合符證不使毫釐差殊則丹道成矣鉛鼎者乃人身中鍊丹之器幌帷者即雲房塞兊垂簾之旨洞賓光透簾帷之詞故平叔引而用之謂一陽自子時始生即受氣之始乃作丹之時若過此以往則有防危之患蓋鉛見癸生須急採金逢望遠不堪嘗也玄珠有象逐陽生陽極陰精漸剝形十月霜飛丹始熟此時入口鬼神驚仰之彌高鑽之彌堅瞻之在前忽焉在後者此儒氏之玄珠有象也圓陀陀光爍爍明了了活潑潑者釋氏之玄珠有象也靈明寶藏洞照乾坤一點真如虛室生白者道氏之玄珠有象也三教雖殊大道則一然大道無形生育天地黃帝遺珠罔象得之今云玄珠有象者何也蓋大道從無入有其象自著故現出深潭日一輪者此象也真人自出現者亦此象也曰玄珠曰金丹皆罔象中之象也不求而自至者也玄哉妙哉此象能有能無能隱能顯時方陽生而玄珠有象時至陰生而玄珠無象故顯於陽極之初而隱於陰極之後其卦為復是一陽生於子而玄珠有象矣其卦為剝是六陰極於亥而玄珠無象矣然必待十月而丹始熟者乃霜飛凛冽之時萬物歸根復命陰極陽生周天數足至此丹方凝結矣故其大如橘甜如蜜為交梨為火棗可吞可吐如龍頷珠如牛有黃吕洞賓謂當時自飲刀圭則德重鬼神欽矣豈非入口鬼神驚乎前弦之後後弦前藥味平平氣象全採得歸來爐裏煅煅成溫養自烹煎前弦者乃上弦初七八弦也後弦者乃下弦二十二三之弦也何謂弦蓋月之初生與月之退縮其形有半如彎弓上弦之狀當此之時丹華澄清金精壯盛藥味平和氣象全備學道者必體天法象採取吾身金水之氣煅於神爐火候抽添溫養烹煎不失水火之宜則金丹成矣奚他求哉長男乍飲西方酒少女初開北地花若使青娥相見後一時關鎖在黃家長男震也少女兊也震屬木兊屬金也西方酒者西為金方酒為水象乃金生水之喻也北地花者北為坎水花為鉛華乃水中鉛之喻也青娥者青女木汞也黃家者黃婆中宫也參同契曰丹砂木精得金乃並蓋大道以相尅為妙金木無令間隔若非關鎖於中宫則震在東兊在西何以為造化蓋木性愛金順義金精戀木慈仁相吞相啖始相親必假中宫之土以成造化也兔雞之月及其時刑德臨門藥象之到此金砂宜沐浴若還加火必傾危物極必反理勢然也故乾之上九純陽之極也聖人必以亢龍有悔戒之況金生於巳旺於酉木生於亥旺於卯是兔者卯之木也雞者酉之金也金主刑木主德刑德臨門者卯酉為二八之門乃日月出入之路陰陽晝夜之分也大道既以陰陽日月為主才到卯酉極旺之地便當沐浴以專氣致柔無為恬淡使沖和元陽充塞天地之間此心無外自然與太虛同體所謂百骸俱理正無為不可更加炎火則藥物走失必傾危矣正是抽添運用却防危也日月三旬一遇逢以時易日法神功守城野戰知凶吉增得靈砂滿鼎紅天地以日月為功照臨萬象晝夜不停必以三十日交會於晦朔之時周而復始所以無所終窮大道以金丹為用烹烏鍊兔降龍伏虎體天法象以時易日而奪天地之造化亦如日月之合璧所以長生不死然而攢年簇月攢月簇日攢日簇時要當固守城郭戰退羣魔不興妄想不動情欲自然有吉而無凶蓋勝則吉敗則凶吉則生凶則死茍一戰一勝長吉無凶所以無價珍寶在吾一身如九轉靈砂日積月纍紅光透徹將動天地驚鬼神矣否泰才交萬物盈屯蒙受卦稟生成此中得意休求象若究羣爻謾役情天地既交而為泰不交而為否泰之義者即既濟未濟之象也水雷屯君子以經綸山下出泉蒙君子以果行育德屯蒙之義即陰陽生長之初正修真持養之時也世人求金丹惑於抽添迷於火候乃以六十四卦三百八十四爻而為作用謾勞歲月白首無成故平叔謂天地一交萬物便盈當於屯蒙始生之初保養元神一如屯難蒙童之時不可一毫外用其心自然進道則天地萬物皆備於我豈不得意何必泥於象數而為羣爻所役乎卦有設象象儀形得意忘言意自明後世迷人唯泥象却行卦氣望飛升太極未判有物混成孰為卦象耶自天地既分乾坤始定則設象畫卦聖人亦不過以日月為易而已其旨玄微大道在是學者不知徒泥其象而行卦氣乃用朝屯而暮蒙朝需而暮訟以六十四卦三百八十四爻分為三十日而乾坤坎離四卦為不用又或二十九日别用補卦之法此真怪誕謾自勞苦不知其卦用水電屯於早間如何作用而象屯也卦用山水蒙於晚間如何作用而象蒙也與夫水天需天水訟之類又有何法度可以體狀之也宜其迷迷相引破壞大道而輒望飛升可謂愚迷甚矣天地盈虧自有時審能消息始知機由來庚甲申明令殺盡三尸道可期天地雖大道有虧盈大道玄微機通消息此非恍惚誕謾也人之一身與天地等凡盈虧消息之理無一不與天相似故子初陽生午後陰降先庚後甲號令嚴明故清明在躬志氣如神也奈何三尸陰魔有以汩其性真亂其血氣顛倒妄想於道何有哉惟能反邪歸正申明庚甲使金木交并不失其時消息通玄機緘默應自然殺盡三尸則道可期矣要得谷神長不死須憑玄牝立根基陽精既返黃金室一顆明珠水不離太上曰谷神不死是謂玄牝靈樞經曰空谷元神守之自真蓋谷則至虛神則至靈虛則善應靈則變化此長生久視之道故謂之谷神謂之神室謂之靈寶藏謂之水晶宫謂之元陽觀謂之太一爐皆是鍊金丹之所也然一陰一陽之謂道一玄一牝之謂丹自鴻濛未判有物混成先天地生及太極既分則二儀奠位玄牝始立矣今欲谷神不死長生久視須憑玄牝二物立為根基日鍊時烹使陰邪消盡陽精獨全返於中宫黃金之室則一顆明珠洞照六合與天地相畢矣玄牝之門世罕知休將口鼻妄施為饒君吐納經千載爭得金烏搦兔兒太上曰玄牝之門為天地根其意玄微凡夫豈易知耶惟其罕知乃以鼻為天門謂之玄口為地尸為之牝吐故納新多入少出晝夜不停以為得道者在是殊不知此特道引安樂法耳雖行經千載何預於金丹大道哉惟金烏搦兔於玄牝之門返本還原於陰陽之祖使二儀合一太朴如初則日月合而成丹所謂與天地合德日月合明者是也異名同出少人知兩者玄玄是要機保性全形明損益紫金真藥是靈奇一陰一陽之謂道一鉛一汞之謂丹其名雖異其實則同其數則兩其體則一惟少有人知所以不得其玄中之玄機中之要也夫茍知之則保性全形必明損益之理何謂損退火之符也何謂益進火之候也一損一益如天地之消長盈虧不差氣候則藥物靈奇不可思議此所謂之紫金丹謂之靈寶藏也始於有作人爭覺及至無為衆所知但見無為為要妙豈知有作是根基大道無為一本自然之妙天何言哉四時行焉百物生焉此其理也況金丹玄妙不可以智力求不可以形質取謂之有也則迎之不見其首隨之不見其後謂之無也則恍恍惚惚其中有物杳杳冥冥其中有精是知有作者人爭覺之而無所為者衆亦知之於是有優劣之分而以無為為要妙夫豈知無為者道之本體而有作者道之根基固非泥象執又桔槔勞碌而後為有作者也亦非瑰然獨處稿木死灰而後為無為也上善若水行其所無事至道不煩得其所固有無為者既安於自然而有作者亦行之自然而已紫陽真人悟真篇請義卷之四
